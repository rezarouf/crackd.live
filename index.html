<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Primary SEO -->
    <title>Crackd.live — Crack the Puzzle. Beat the World.</title>
    <meta name="description" content="20 daily puzzle games. Global leaderboards. One login. Word games, number games, and viral mobile puzzles — all free." />
    <meta name="keywords" content="puzzle games, wordle, daily games, sudoku, nerdle, connections, word games, mobile puzzles, leaderboard" />
    <meta name="author" content="Crackd.live" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://crackd.live/" />

    <!-- Theme -->
    <meta name="theme-color" content="#0D0F14" />
    <meta name="msapplication-TileColor" content="#0D0F14" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <link rel="apple-touch-icon" href="/logo-icon.png" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Crackd.live" />
    <meta property="og:url"         content="https://crackd.live/" />
    <meta property="og:title"       content="Crackd.live — Crack the Puzzle. Beat the World." />
    <meta property="og:description" content="20 daily puzzle games. Global leaderboards. One login. Word games, number games, and viral mobile puzzles — all free." />
    <meta property="og:image"       content="https://crackd.live/logo-wordmark.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="Crackd.live — daily puzzle games" />
    <meta property="og:locale"      content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@crackdlive" />
    <meta name="twitter:creator"     content="@crackdlive" />
    <meta name="twitter:url"         content="https://crackd.live/" />
    <meta name="twitter:title"       content="Crackd.live — Crack the Puzzle. Beat the World." />
    <meta name="twitter:description" content="20 daily puzzle games. Global leaderboards. One login. Word games, number games, and viral mobile puzzles — all free." />
    <meta name="twitter:image"       content="https://crackd.live/logo-wordmark.png" />
    <meta name="twitter:image:alt"   content="Crackd.live — daily puzzle games" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body { background: #0D0F14; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0D0F14; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

      #splash {
        position: fixed;
        inset: 0;
        background: #0D0F14;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.35s ease;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash-logo {
        font-family: 'Inter', sans-serif;
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: -0.03em;
        color: #F0F0F0;
        display: flex;
        align-items: center;
        gap: 0;
        animation: splash-pulse 1.2s ease-in-out infinite alternate;
      }
      #splash-logo .bolt { color: #F5A623; }
      @keyframes splash-pulse {
        from { opacity: 0.7; transform: scale(0.97); }
        to   { opacity: 1;   transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-logo">CRACKD.L<span class="bolt">⚡</span>VE</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
